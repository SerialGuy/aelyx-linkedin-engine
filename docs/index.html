<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aelyx — Post Review</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --charcoal: #1C2620;
    --charcoal-deep: #141B17;
    --cream: #F0EDE4;
    --cream-dim: #C9C5B8;
    --brass: #C9914F;
    --brass-dim: #8E6736;
    --line: rgba(240, 237, 228, 0.12);
    --danger: #B5604A;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--charcoal-deep);
    color: var(--cream);
    font-family: 'Inter', system-ui, sans-serif;
    min-height: 100vh;
  }

  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 32px;
    border-bottom: 1px solid var(--line);
    gap: 16px;
    flex-wrap: wrap;
  }

  .topbar .wordmark {
    font-family: 'Fraunces', serif;
    font-size: 19px;
    letter-spacing: 0.02em;
    color: var(--cream);
  }
  .topbar .wordmark span { color: var(--brass); }

  .queue-position {
    font-size: 13px;
    color: var(--cream-dim);
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  .topbar-controls {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .view-toggle {
    display: flex;
    border: 1px solid var(--line);
    border-radius: 4px;
    overflow: hidden;
  }

  .view-toggle button {
    font-size: 12px;
    font-weight: 500;
    padding: 8px 14px;
    background: transparent;
    color: var(--cream-dim);
    border: none;
    border-radius: 0;
    cursor: pointer;
  }

  .view-toggle button.active {
    background: var(--charcoal);
    color: var(--cream);
  }

  .view-toggle button:hover:not(.active) {
    opacity: 0.85;
  }

  .pending-stack {
    display: flex;
    flex-direction: column;
    gap: 40px;
  }

  .manual-bar {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 20px;
    padding: 10px 12px;
    background: rgba(201, 145, 79, 0.08);
    border: 1px solid rgba(201, 145, 79, 0.22);
    border-radius: 4px;
    font-size: 12px;
    color: var(--cream-dim);
  }

  .manual-bar span {
    flex: 1;
  }

  .icon-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 34px;
    height: 34px;
    padding: 0;
    border-radius: 4px;
    border: 1px solid var(--line);
    background: var(--charcoal-deep);
    color: var(--cream-dim);
    cursor: pointer;
    flex-shrink: 0;
    transition: color 0.15s ease, border-color 0.15s ease, background 0.15s ease;
  }

  .icon-btn:hover {
    color: var(--brass);
    border-color: var(--brass-dim);
    opacity: 1;
  }

  .icon-btn.copied {
    color: #8FAF8A;
    border-color: #8FAF8A;
  }

  .icon-btn svg {
    width: 16px;
    height: 16px;
    fill: none;
    stroke: currentColor;
    stroke-width: 1.8;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .visual-pane .image-tools {
    position: absolute;
    top: 14px;
    right: 14px;
    display: flex;
    gap: 8px;
  }

  main {
    max-width: 980px;
    margin: 0 auto;
    padding: 48px 24px 96px;
  }

  .empty-state {
    text-align: center;
    padding: 120px 24px;
    color: var(--cream-dim);
  }
  .empty-state .mark {
    font-family: 'Fraunces', serif;
    font-size: 28px;
    color: var(--cream);
    margin-bottom: 12px;
  }

  .review-card {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0;
    background: var(--charcoal);
    border: 1px solid var(--line);
    border-radius: 4px;
    overflow: hidden;
  }

  @media (max-width: 760px) {
    .review-card { grid-template-columns: 1fr; }
  }

  .visual-pane {
    position: relative;
    background: var(--charcoal-deep);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 28px;
  }
  .visual-pane svg {
    width: 100%;
    height: auto;
    display: block;
  }
  .visual-pane .svg-host {
    width: 100%;
  }
  .visual-pane .svg-host svg {
    width: 100%;
    height: auto;
    display: block;
  }
  .visual-pane .frame-tag {
    position: absolute;
    bottom: 14px;
    right: 18px;
    font-family: 'Fraunces', serif;
    font-size: 11px;
    letter-spacing: 0.08em;
    color: var(--brass-dim);
    text-transform: uppercase;
  }

  .copy-pane {
    padding: 40px 36px;
    display: flex;
    flex-direction: column;
  }

  .meta-row {
    display: flex;
    gap: 8px;
    margin-bottom: 22px;
  }
  .tag {
    font-size: 11px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--brass);
    border: 1px solid var(--brass-dim);
    padding: 4px 9px;
    border-radius: 100px;
  }

  .hook {
    font-family: 'Fraunces', serif;
    font-size: 26px;
    line-height: 1.28;
    font-weight: 500;
    margin: 0 0 18px;
    color: var(--cream);
  }

  .body-text {
    font-size: 15px;
    line-height: 1.65;
    color: var(--cream-dim);
    white-space: pre-wrap;
    margin-bottom: 18px;
    flex-grow: 1;
  }

  .cta-line {
    font-size: 14px;
    color: var(--brass);
    font-style: italic;
    margin-bottom: 28px;
  }

  .actions {
    display: flex;
    gap: 12px;
    border-top: 1px solid var(--line);
    padding-top: 24px;
  }

  button {
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.01em;
    padding: 12px 22px;
    border-radius: 4px;
    border: none;
    cursor: pointer;
    transition: opacity 0.15s ease;
  }
  button:hover { opacity: 0.85; }
  button:disabled { opacity: 0.4; cursor: not-allowed; }

  .btn-approve {
    background: var(--brass);
    color: var(--charcoal-deep);
    flex: 1;
  }
  .btn-skip {
    background: transparent;
    color: var(--cream-dim);
    border: 1px solid var(--line);
  }

  .status-banner {
    font-size: 13px;
    color: var(--cream-dim);
    margin-top: 16px;
    text-align: center;
  }

  .archive-section {
    margin-top: 64px;
  }
  .archive-section h2 {
    font-family: 'Fraunces', serif;
    font-size: 16px;
    color: var(--cream-dim);
    letter-spacing: 0.02em;
    font-weight: 500;
    border-bottom: 1px solid var(--line);
    padding-bottom: 12px;
  }
  .archive-row {
    display: flex;
    justify-content: space-between;
    padding: 14px 0;
    border-bottom: 1px solid var(--line);
    font-size: 13px;
    color: var(--cream-dim);
  }
  .archive-row .archive-status {
    text-transform: uppercase;
    letter-spacing: 0.04em;
    font-size: 11px;
  }
  .status-published { color: #8FAF8A; }
  .status-ready_for_manual_post { color: var(--brass); }
  .status-skipped { color: var(--cream-dim); opacity: 0.6; }
</style>
</head>
<body>

<div class="topbar">
  <div class="wordmark">aelyx <span>/</span> post review</div>
  <div class="topbar-controls">
    <div class="view-toggle" id="viewToggle">
      <button type="button" data-view="single" class="active">One at a time</button>
      <button type="button" data-view="all">View all pending</button>
    </div>
    <div class="queue-position" id="queuePosition"></div>
  </div>
</div>

<main id="main">
  <!-- populated by JS -->
</main>

<script>
  // Override in a <meta name="github-repo" content="owner/repo"> tag if needed.
  // Otherwise auto-detected from github.io project pages URLs.
  const GITHUB_REPO = detectGithubRepo() || "SerialGuy/aelyx-linkedin-engine";

  let queue = [];
  let viewMode = sessionStorage.getItem('aelyx_view_mode') || 'single';

  const ICONS = {
    copy: '<svg viewBox="0 0 24 24"><rect x="9" y="9" width="11" height="11" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>',
    image: '<svg viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="14" rx="2"/><circle cx="8.5" cy="10.5" r="1.5"/><path d="m21 16-5-5L7 20"/></svg>',
    download: '<svg viewBox="0 0 24 24"><path d="M12 3v12"/><path d="m7 10 5 5 5-5"/><path d="M5 21h14"/></svg>',
  };

  function detectGithubRepo() {
    const meta = document.querySelector('meta[name="github-repo"]')?.content?.trim();
    if (meta) return meta;

    const host = window.location.hostname;
    if (!host.endsWith('github.io')) return null;

    const owner = host.replace('.github.io', '');
    const project = window.location.pathname.split('/').filter(Boolean)[0];
    return project ? `${owner}/${project}` : null;
  }

  function formatLabel(value) {
    return String(value || '').replace(/_/g, ' ');
  }

  function postText(post) {
    return [post.hook_text, post.body, post.cta].filter(Boolean).join('\n\n');
  }

  function flashCopied(btn) {
    btn.classList.add('copied');
    const prev = btn.title;
    btn.title = 'Copied!';
    setTimeout(() => {
      btn.classList.remove('copied');
      btn.title = prev;
    }, 1600);
  }

  function makeIconButton(title, iconHtml, onClick) {
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'icon-btn';
    btn.title = title;
    btn.innerHTML = iconHtml;
    btn.addEventListener('click', onClick);
    return btn;
  }

  async function svgToPngBlob(svgString) {
    return new Promise((resolve, reject) => {
      const img = new Image();
      const url = URL.createObjectURL(new Blob([svgString], { type: 'image/svg+xml;charset=utf-8' }));
      img.onload = () => {
        const canvas = document.createElement('canvas');
        canvas.width = 1200;
        canvas.height = 1200;
        canvas.getContext('2d').drawImage(img, 0, 0, 1200, 1200);
        URL.revokeObjectURL(url);
        canvas.toBlob(blob => blob ? resolve(blob) : reject(new Error('PNG conversion failed')), 'image/png');
      };
      img.onerror = () => {
        URL.revokeObjectURL(url);
        reject(new Error('Could not render image'));
      };
      img.src = url;
    });
  }

  async function copyPostText(post, btn) {
    try {
      await navigator.clipboard.writeText(postText(post));
      flashCopied(btn);
    } catch (_) {
      alert('Could not copy text — your browser may block clipboard access on this page.');
    }
  }

  async function copyPostImage(post, btn) {
    try {
      const blob = await svgToPngBlob(post.svg);
      if (navigator.clipboard?.write && window.ClipboardItem) {
        await navigator.clipboard.write([new ClipboardItem({ 'image/png': blob })]);
        flashCopied(btn);
        return;
      }
      downloadPostImage(post);
      flashCopied(btn);
    } catch (_) {
      try {
        downloadPostImage(post);
        flashCopied(btn);
      } catch (err) {
        alert(err.message || 'Could not copy image. Try Download instead.');
      }
    }
  }

  function downloadPostImage(post) {
    const link = document.createElement('a');
    link.download = `${post.id || 'aelyx-post'}.png`;
    svgToPngBlob(post.svg).then(blob => {
      link.href = URL.createObjectURL(blob);
      link.click();
      URL.revokeObjectURL(link.href);
    });
  }

  function setupViewToggle() {
    const toggle = document.getElementById('viewToggle');
    for (const btn of toggle.querySelectorAll('button')) {
      btn.classList.toggle('active', btn.dataset.view === viewMode);
      btn.onclick = () => {
        viewMode = btn.dataset.view;
        sessionStorage.setItem('aelyx_view_mode', viewMode);
        for (const b of toggle.querySelectorAll('button')) {
          b.classList.toggle('active', b.dataset.view === viewMode);
        }
        renderCurrent();
      };
    }
  }

  async function loadQueue() {
    try {
      const res = await fetch('data/queue.json?_=' + Date.now());
      if (!res.ok) throw new Error(`Could not load queue (${res.status})`);
      queue = await res.json();
      renderCurrent();
    } catch (err) {
      document.getElementById('main').innerHTML = `
        <div class="empty-state">
          <div class="mark">Could not load queue.</div>
          <div>${escapeHtml(err.message)}</div>
        </div>`;
    }
  }

  function pendingPosts() {
    return queue.filter(p => p.status === 'pending_approval');
  }

  function mountSvg(container, svgString) {
    container.replaceChildren();
    if (!svgString) {
      container.textContent = 'No preview available.';
      return;
    }

    // Never inject SVG via innerHTML — embedded <style> tags break the page DOM
    // and silently prevent Approve/Skip buttons from mounting.
    const doc = new DOMParser().parseFromString(svgString, 'image/svg+xml');
    const err = doc.querySelector('parsererror');
    if (err) {
      container.textContent = 'Preview unavailable (invalid SVG).';
      return;
    }
    container.appendChild(doc.documentElement);
  }

  function renderCurrent() {
    const pending = pendingPosts();
    const main = document.getElementById('main');
    const posRow = document.getElementById('queuePosition');
    main.replaceChildren();
    setupViewToggle();

    if (pending.length === 0) {
      posRow.textContent = '';
      const empty = document.createElement('div');
      empty.className = 'empty-state';
      empty.innerHTML = `
        <div class="mark">All caught up.</div>
        <div>No posts waiting for review. The next one lands after tomorrow's run.</div>`;
      main.appendChild(empty);
      renderArchive(main);
      return;
    }

    posRow.textContent = `${pending.length} pending`;

    if (viewMode === 'all') {
      const stack = document.createElement('div');
      stack.className = 'pending-stack';
      pending.forEach((post, index) => {
        stack.appendChild(buildReviewCard(post, { showIndex: index + 1, total: pending.length }));
      });
      main.appendChild(stack);
    } else {
      main.appendChild(buildReviewCard(pending[0], { showIndex: 1, total: pending.length }));
    }

    renderArchive(main);
  }

  function buildReviewCard(post, { showIndex, total }) {
    const card = document.createElement('div');
    card.className = 'review-card';
    card.dataset.postId = post.id;

    const visualPane = document.createElement('div');
    visualPane.className = 'visual-pane';

    const imageTools = document.createElement('div');
    imageTools.className = 'image-tools';
    const copyImgBtn = makeIconButton('Copy image (PNG)', ICONS.image, () => copyPostImage(post, copyImgBtn));
    const dlImgBtn = makeIconButton('Download image (PNG)', ICONS.download, () => {
      downloadPostImage(post);
      flashCopied(dlImgBtn);
    });
    imageTools.append(copyImgBtn, dlImgBtn);
    visualPane.appendChild(imageTools);

    const svgHost = document.createElement('div');
    svgHost.className = 'svg-host';
    mountSvg(svgHost, post.svg);
    visualPane.appendChild(svgHost);

    const frameTag = document.createElement('div');
    frameTag.className = 'frame-tag';
    frameTag.textContent = total > 1 ? `${showIndex} of ${total} · ${formatLabel(post.angle)}` : `aelyx · ${formatLabel(post.angle)}`;
    visualPane.appendChild(frameTag);

    const copyPane = document.createElement('div');
    copyPane.className = 'copy-pane';

    const manualBar = document.createElement('div');
    manualBar.className = 'manual-bar';
    const manualHint = document.createElement('span');
    manualHint.textContent = 'Manual post: copy text + image, paste into LinkedIn, then Approve to mark done.';
    const copyTextBtn = makeIconButton('Copy post text', ICONS.copy, () => copyPostText(post, copyTextBtn));
    manualBar.append(manualHint, copyTextBtn);
    copyPane.appendChild(manualBar);

    const metaRow = document.createElement('div');
    metaRow.className = 'meta-row';
    for (const label of [post.angle, post.hook_style]) {
      const tag = document.createElement('span');
      tag.className = 'tag';
      tag.textContent = formatLabel(label);
      metaRow.appendChild(tag);
    }

    const hook = document.createElement('p');
    hook.className = 'hook';
    hook.textContent = post.hook_text;

    const body = document.createElement('div');
    body.className = 'body-text';
    body.textContent = post.body;

    const cta = document.createElement('div');
    cta.className = 'cta-line';
    cta.textContent = post.cta;

    const actions = document.createElement('div');
    actions.className = 'actions';

    const approveBtn = document.createElement('button');
    approveBtn.className = 'btn-approve';
    approveBtn.type = 'button';
    approveBtn.textContent = 'Approve & mark done';
    approveBtn.addEventListener('click', () => approvePost(post.id, card));

    const skipBtn = document.createElement('button');
    skipBtn.className = 'btn-skip';
    skipBtn.type = 'button';
    skipBtn.textContent = 'Skip';
    skipBtn.addEventListener('click', () => skipPost(post.id, card));

    const banner = document.createElement('div');
    banner.className = 'status-banner';

    actions.append(approveBtn, skipBtn);
    copyPane.append(metaRow, hook, body, cta, actions, banner);
    card.append(visualPane, copyPane);
    return card;
  }

  function getCardControls(card) {
    if (!card) return { approveBtn: null, skipBtn: null, banner: null };
    return {
      approveBtn: card.querySelector('.btn-approve'),
      skipBtn: card.querySelector('.btn-skip'),
      banner: card.querySelector('.status-banner'),
    };
  }

  function setBusy(card, busy) {
    const { approveBtn, skipBtn } = getCardControls(card);
    if (approveBtn) approveBtn.disabled = busy;
    if (skipBtn) skipBtn.disabled = busy;
  }

  function renderArchive(main) {
    const decided = queue.filter(p => p.status !== 'pending_approval');
    if (decided.length === 0) return;

    const section = document.createElement('div');
    section.className = 'archive-section';

    const heading = document.createElement('h2');
    heading.textContent = 'Recent decisions';
    section.appendChild(heading);

    for (const p of decided.slice().reverse()) {
      const row = document.createElement('div');
      row.className = 'archive-row';

      const hook = document.createElement('span');
      hook.textContent = p.hook_text;

      const status = document.createElement('span');
      status.className = `archive-status status-${p.status}`;
      status.textContent = formatLabel(p.status);

      row.append(hook, status);
      section.appendChild(row);
    }

    main.appendChild(section);
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  function requireToken() {
    let token = sessionStorage.getItem('aelyx_gh_token');
    if (token) return token.trim();

    token = prompt(
      "One-time setup: paste a GitHub fine-grained personal access token with " +
      "'Contents: Read and write' and 'Actions: Read and write' on this repo. " +
      "It is stored only in this browser session and sent only to GitHub's API."
    );
    if (!token) return null;

    token = token.trim();
    sessionStorage.setItem('aelyx_gh_token', token);
    return token;
  }

  async function dispatchWorkflow(eventType, postId) {
    const token = requireToken();
    if (!token) {
      throw new Error('GitHub token required. Paste a PAT when prompted, then try again.');
    }

    const res = await fetch(`https://api.github.com/repos/${GITHUB_REPO}/dispatches`, {
      method: 'POST',
      headers: {
        'Authorization': `Bearer ${token}`,
        'Accept': 'application/vnd.github+json',
        'Content-Type': 'application/json',
        'X-GitHub-Api-Version': '2022-11-28',
      },
      body: JSON.stringify({
        event_type: eventType,
        client_payload: { post_id: postId },
      }),
    });

    if (res.status === 204) return;

    let detail = await res.text();
    try {
      const json = JSON.parse(detail);
      detail = json.message || detail;
    } catch (_) {}

    if (res.status === 401 || res.status === 403) {
      sessionStorage.removeItem('aelyx_gh_token');
      throw new Error(`${res.status}: ${detail}. Token cleared — paste a new one and retry.`);
    }

    throw new Error(`${res.status}: ${detail}`);
  }

  async function approvePost(postId, card) {
    const { banner } = getCardControls(card);
    banner.textContent = 'Sending approval…';
    setBusy(card, true);

    try {
      await dispatchWorkflow('approve_post', postId);
      banner.textContent = 'Marked done — updating queue…';
      setTimeout(loadQueue, 4000);
    } catch (e) {
      banner.textContent = e.message || 'Approval failed. Try again.';
      setBusy(card, false);
    }
  }

  async function skipPost(postId, card) {
    const { banner } = getCardControls(card);
    banner.textContent = 'Marking skipped…';
    setBusy(card, true);

    try {
      await dispatchWorkflow('skip_post', postId);
      banner.textContent = 'Skipped. Updating…';
      setTimeout(loadQueue, 4000);
    } catch (e) {
      banner.textContent = e.message || 'Skip failed. Try again.';
      setBusy(card, false);
    }
  }

  loadQueue();
  setInterval(loadQueue, 60000);
</script>

</body>
</html>
